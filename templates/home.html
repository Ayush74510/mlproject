<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Predictor Dashboard</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            /* Deep dark slate background */
            background-color: #0f172a; 
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard-container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            /* Dark gray background for the overall card */
            background: #1e293b;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            overflow: hidden; 
        }

        /* --- Left Side: Info & Results Panel --- */
        .info-panel {
            background: #0b1120; /* Even darker slate for contrast */
            color: #ffffff;
            width: 40%;
            padding: 50px 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .info-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 15px;
            line-height: 1.2;
        }

        .info-header p {
            color: #94a3b8; /* Soft light gray */
            font-size: 15px;
            line-height: 1.6;
        }

        /* The Result Box */
        .result-box {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 25px;
            border-radius: 16px;
            text-align: center;
            margin-top: 30px;
            animation: slideUp 0.6s ease-out forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-box span {
            display: block;
            color: #34d399; /* Mint green for success feel */
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .result-box h2 {
            font-size: 48px;
            font-weight: 700;
            color: #ffffff;
            margin: 0;
        }

        /* --- Right Side: The Form --- */
        .form-panel {
            width: 60%;
            padding: 50px;
            background: #1e293b;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
        }

        .form-group.full-width {
            grid-column: span 2;
        }

        label {
            font-size: 13px;
            font-weight: 600;
            color: #cbd5e1; /* Light slate */
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid #334155; /* Subtle dark border */
            border-radius: 10px;
            font-size: 15px;
            color: #f8fafc; /* Near white text */
            background-color: #0f172a; /* Input background matches body */
            transition: all 0.2s ease;
            outline: none;
            appearance: none; 
        }

        /* Changes the color of the placeholder text */
        input::placeholder {
            color: #64748b;
        }

        input:focus, select:focus {
            border-color: #6366f1; /* Vibrant indigo */
            background-color: #1e293b;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        /* --- CSS HACK TO REMOVE NUMBER INPUT ARROWS --- */
        
        /* Chrome, Safari, Edge, Opera */
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        /* Firefox */
        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        /* Custom Button */
        .btn-submit {
            grid-column: span 2;
            background: #4f46e5; 
            color: white;
            font-size: 16px;
            font-weight: 600;
            padding: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.3s ease;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #4338ca;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .dashboard-container {
                flex-direction: column;
            }
            .info-panel, .form-panel {
                width: 100%;
                padding: 30px;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .form-group.full-width {
                grid-column: span 1;
            }
            .btn-submit {
                grid-column: span 1;
            }
        }
    </style>
</head>
<body>

    <div class="dashboard-container">
        
        <div class="info-panel">
            <div class="info-header">
                <h1>Data Entry Dashboard</h1>
                <p>Input the student's demographic and testing data. Our algorithm will analyze the patterns to predict their final math score.</p>
            </div>

            {% if results %}
            <div class="result-box">
                <span>Predicted Math Score</span>
                <h2>{{ results }}</h2>
            </div>
            {% endif %}
        </div>

        <div class="form-panel">
            <form action="{{ url_for('predict_datapoint') }}" method="post" class="form-grid">

                <div class="form-group">
                    <label>Gender</label>
                    <select name="gender" required>
                        <option value="" disabled selected>Select Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Race / Ethnicity</label>
                    <select name="ethnicity" required>
                        <option value="" disabled selected>Select Group</option>
                        <option value="group A">Group A</option>
                        <option value="group B">Group B</option>
                        <option value="group C">Group C</option>
                        <option value="group D">Group D</option>
                        <option value="group E">Group E</option>
                    </select>
                </div>

                <div class="form-group full-width">
                    <label>Parental Education</label>
                    <select name="parental_level_of_education" required>
                        <option value="" disabled selected>Select Education</option>
                        <option value="associate's degree">Associate's Degree</option>
                        <option value="bachelor's degree">Bachelor's Degree</option>
                        <option value="master's degree">Master's Degree</option>
                        <option value="high school">High School</option>
                        <option value="some college">Some College</option>
                        <option value="some high school">Some High School</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Lunch Type</label>
                    <select name="lunch" required>
                        <option value="" disabled selected>Select Lunch Type</option>
                        <option value="standard">Standard</option>
                        <option value="free/reduced">Free / Reduced</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Test Preparation</label>
                    <select name="test_preparation_course" required>
                        <option value="" disabled selected>Select Status</option>
                        <option value="completed">Completed</option>
                        <option value="none">None</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Reading Score</label>
                    <input type="number" name="reading_score" min="0" max="100" placeholder="0 - 100" required>
                </div>

                <div class="form-group">
                    <label>Writing Score</label>
                    <input type="number" name="writing_score" min="0" max="100" placeholder="0 - 100" required>
                </div>

                <button type="submit" class="btn-submit">Analyze & Predict</button>

            </form>
        </div>

    </div>

</body>
</html>
