<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Performance Predictor</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Animated gradient background */
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            overflow: hidden;
            position: relative;
        }

        /* Background Animation Keyframes */
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Decorative floating background shapes */
        .shape {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
        }
        .shape.one {
            width: 300px;
            height: 300px;
            background: #ffb86c;
            top: -50px;
            left: -50px;
            border-radius: 50%;
        }
        .shape.two {
            width: 400px;
            height: 400px;
            background: #bd93f9;
            bottom: -100px;
            right: -50px;
            border-radius: 50%;
        }

        /* Glassmorphism Card Container */
        .container {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 50px 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            max-width: 500px;
            width: 90%;
            transition: transform 0.3s ease;
        }

        .container:hover {
            transform: translateY(-5px);
        }

        .icon-badge {
            font-size: 50px;
            margin-bottom: 15px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        /* Subtle floating animation for the emoji */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            color: #2d3436;
            margin-bottom: 15px;
            font-size: 28px;
            font-weight: 700;
        }

        p {
            color: #636e72;
            margin-bottom: 35px;
            line-height: 1.7;
            font-size: 16px;
            font-weight: 300;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 30px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            text-decoration: none;
            border-radius: 50px; /* Pill shape */
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        .btn:hover {
            background: linear-gradient(135deg, #5b4bc4, #8c84eb);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.6);
            transform: scale(1.05);
        }

        /* Arrow animation inside the button */
        .btn span.arrow {
            transition: transform 0.3s ease;
        }
        .btn:hover span.arrow {
            transform: translateX(5px);
        }

    </style>
</head>
<body>

    <div class="shape one"></div>
    <div class="shape two"></div>

    <div class="container">
        <div class="icon-badge">🎓</div>
        <h1>Student Performance Predictor</h1>

        <p>
            Harness the power of Machine Learning to predict a student's math score based on demographic and academic data. Discover insights instantly!
        </p>

        <a href="{{ url_for('predict_datapoint') }}" class="btn">
            Start Prediction <span class="arrow">→</span>
        </a>
    </div>

</body>
</html>
